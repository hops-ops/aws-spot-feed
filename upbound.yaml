apiVersion: meta.dev.upbound.io/v2alpha1
kind: Project
metadata:
  name: aws-spot-feed
spec:
  dependsOn:
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-aws-s3
    version: '>=v2'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-aws-ec2
    version: '>=v2'
  - apiVersion: pkg.crossplane.io/v1
    kind: Function
    package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
    version: '>=v0.6.0'
  description: Creates S3 bucket and SpotDatafeedSubscription for accurate spot instance
    pricing in OpenCost. One per AWS account.
  license: Apache-2.0
  maintainer: Patrick Lee Scott <pat@patscott.io>
  repository: ghcr.io/hops-ops/aws-spot-feed
  source: github.com/hops-ops/aws-spot-feed
